<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Chamadas - Auri Auto Peças</title>
    <style>
        :root {
            --bg: #050a14;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.06);
            --white: #ffffff;
            --neon: rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at center, #0a162b 0%, #050a14 100%);
            color: var(--white);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 6.5fr 3.5fr;
            gap: 30px;
            width: 95vw;
            max-width: 1800px;
            align-items: start;
        }

        .header-label {
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 4px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--gold), transparent);
            opacity: 0.5;
        }

        .col-principal { display: flex; flex-direction: column; }

        .container-principal {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px 40px;
            min-height: 75vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .container-principal::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .fade-up { animation: fadeUp 0.6s ease-out forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nome-cliente {
            font-size: clamp(1rem, 2vw, 1.8rem);
            color: var(--gold);
            font-weight: 400;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .veiculo-modelo {
            font-size: clamp(2rem, 5vw, 4.5rem); 
            font-weight: 700; 
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 25px;
            background: linear-gradient(to bottom, #ffffff 40%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            letter-spacing: 1px;
        }

        .placa-container {
            background: #ffffff;
            color: #000000;
            padding: 10px 70px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            border: 5px solid #222;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            margin-bottom: 30px;
            position: relative;
        }

        .placa-container::after, .placa-container::before {
            content: ""; position: absolute; width: 8px; height: 8px; background: #555; border-radius: 50%; top: 50%; transform: translateY(-50%);
        }
        .placa-container::before { left: 15px; }
        .placa-container::after { right: 15px; }

        .instrucao-guiche { font-size: clamp(1.8rem, 3.5vw, 3.5rem); font-weight: 300; }

        .col-historico { display: flex; flex-direction: column; }
        .historico-lista { display: flex; flex-direction: column; gap: 12px; }

        /* ESTILIZAÇÃO DO HISTÓRICO COM NOMES E DATA MAIS ACESOS */
        .card-historico {
            background: rgba(255, 255, 255, 0.04);
            border-left: 5px solid var(--gold);
            padding: 15px 18px;
            border-radius: 12px;
            animation: slideIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .hist-veiculo { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; color: #aaa; line-height: 1.2; }
        .hist-placa { font-family: monospace; font-weight: bold; color: var(--gold); font-size: 1rem; letter-spacing: 1px; margin-bottom: 2px; }
        
        /* Nome do condutor agora em branco puro e mais forte */
        .hist-nome { 
            font-size: 0.9rem; 
            color: #ffffff; 
            text-transform: uppercase; 
            display: block; 
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        /* Data e hora agora mais nítidas */
        .hist-data-hora {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7); 
            font-weight: 600;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .chamada-nova { animation: pulseNeon 1.5s infinite ease-in-out; }
        @keyframes pulseNeon {
            0% { border-color: rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
            50% { border-color: var(--gold); box-shadow: 0 0 40px var(--neon); }
            100% { border-color: rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="col-principal">
            <span class="header-label">Atendimento Atual</span>
            <div class="container-principal" id="painelPrincipal">
                <div class="nome-cliente fade-up" id="campoNome">Aguardando...</div>
                <div class="veiculo-modelo fade-up" id="campoVeiculo">---</div>
                <div class="placa-container fade-up" id="campoPlaca">-------</div>
                <div class="instrucao-guiche fade-up">
                    Dirija-se ao <span id="campoGuiche" style="color:var(--gold); font-weight:900;">---</span>
                </div>
            </div>
        </div>

        <div class="col-historico">
            <span class="header-label" style="justify-content: center;">Histórico Recente</span>
            <div id="listaHistorico" class="historico-lista"></div>
        </div>
    </div>

    <audio id="audioChamada" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const urlFinal = 'https://script.google.com/macros/s/AKfycbxBIPiuBZH0Wpo93secDk_ZMAsD_YYE-VkFumVJNgdCeA-rZpQ1BoKJG6c9Hv0ueyjsWA/exec';
        let ultimoIdRecebido = "";
        let historico = [];

        function limparTexto(valor) {
            if (!valor) return "";
            if (typeof valor === 'object' && valor instanceof Date) return "";
            let texto = valor.toString().trim();
            const regexData = /(\d{4}-\d{2}-\d{2}|GMT|00:00:00|T\d{2}:\d{2})/;
            if (regexData.test(texto)) {
                let partes = texto.split(regexData);
                let apenasTexto = partes[0].trim();
                return apenasTexto.length > 0 ? apenasTexto.toUpperCase() : "";
            }
            return texto.toUpperCase().trim();
        }

        async function atualizarPainel() {
            try {
                const response = await fetch(`${urlFinal}?read=atual&t=${Date.now()}`);
                const dados = await response.json();

                if (dados.idUnico !== ultimoIdRecebido) {
                    const painel = document.getElementById('painelPrincipal');
                    
                    if (ultimoIdRecebido !== "") {
                        const agora = new Date();
                        const tempo = `${agora.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})} | ${agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;

                        adicionarAoHistorico({
                            nome: document.getElementById('campoNome').innerText,
                            veiculo: document.getElementById('campoVeiculo').innerText,
                            placa: document.getElementById('campoPlaca').innerText,
                            tempo: tempo
                        });
                        
                        const som = document.getElementById('audioChamada');
                        som.currentTime = 0;
                        som.play().catch(() => {});

                        painel.classList.add('chamada-nova');
                        setTimeout(() => painel.classList.remove('chamada-nova'), 4500);
                    }

                    const elementos = painel.querySelectorAll('.fade-up');
                    elementos.forEach(el => {
                        el.style.animation = 'none';
                        el.offsetHeight; 
                        el.style.animation = null;
                    });

                    const condutor = limparTexto(dados.condutor) || "CLIENTE";
                    const marca = limparTexto(dados.carro || "");
                    const modelo = limparTexto(dados.veiculo || "");
                    const placa = limparTexto(dados.placa) || "-------";
                    const veiculoCompleto = `${marca} ${modelo}`.trim() || "---";

                    document.getElementById('campoNome').innerText = condutor;
                    document.getElementById('campoVeiculo').innerText = veiculoCompleto;
                    document.getElementById('campoPlaca').innerText = placa;
                    
                    let guicheTexto = dados.guiche.toString().toUpperCase();
                    document.getElementById('campoGuiche').innerText = guicheTexto.includes("GUICHÊ") ? guicheTexto : "GUICHÊ " + guicheTexto;

                    ultimoIdRecebido = dados.idUnico;
                }
            } catch (error) { console.error("Erro:", error); }
        }

        function adicionarAoHistorico(item) {
            historico.unshift(item);
            if (historico.length > 5) historico.pop();
            const container = document.getElementById('listaHistorico');
            container.innerHTML = "";
            historico.forEach(h => {
                const d = document.createElement('div');
                d.className = 'card-historico';
                d.innerHTML = `
                    <span class="hist-veiculo">${h.veiculo}</span>
                    <span class="hist-placa">${h.placa}</span>
                    <span class="hist-nome">${h.nome}</span>
                    <span class="hist-data-hora">${h.tempo}</span>
                `;
                container.appendChild(d);
            });
        }

        setInterval(atualizarPainel, 3000);
        window.onload = atualizarPainel;
    </script>
</body>
</html>
